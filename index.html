<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOXDraft</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --accent: #22c55e;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            padding: 20px; 
            background: var(--bg); 
            color: var(--text);
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .wrapper { width: 100%; max-width: 600px; }
        
        /* Тепер використовуємо локальний логотип */
        .logo-main { width: 100%; max-width: 300px; display: block; margin: 0 auto 20px; }
        
        .step { 
            background: white; 
            padding: 24px; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
            width: 100%; 
            box-sizing: border-box; 
        }
        
        h2 { margin-top: 0; font-size: 1.25rem; color: var(--text); margin-bottom: 20px; }

        .upload-btn { 
            display: block; 
            padding: 20px; 
            background: var(--primary); 
            color: white; 
            text-align: center; 
            cursor: pointer; 
            border-radius: 12px; 
            font-weight: 600;
            transition: transform 0.1s, background 0.2s;
        }
        
        .upload-btn:active { transform: scale(0.98); }
        
        #cropper-container { 
            margin-top: 20px; 
            border-radius: 8px; 
            overflow: hidden; 
            background: #e2e8f0;
            min-height: 200px;
        }

        .actions { 
            margin-top: 20px; 
            display: flex; 
            gap: 12px; 
        }

        .btn { 
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        .btn-add { background-color: var(--secondary); }
        .btn-process { background-color: var(--accent); }

        .hidden { display: none; }
        img { max-width: 100%; display: block; }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Оновлений шлях до лого -->
        <img src="assets/site-logo.png" alt="Fox League" class="logo-main">

        <div id="step-1" class="step">
            <h2>Крок 1: Завантаження результатів опитування</h2>
            <label for="file-input" class="upload-btn">Натисни ТУТ щоб загрузити скрін</label>
            <input type="file" id="file-input" accept="image/*" class="hidden">
            
            <div id="cropper-container"></div>
            
            <div class="actions">
                <button id="add-screen-btn" class="btn btn-add hidden">+ЩЕ СКРІН</button>
                <button id="process-btn" class="btn btn-process hidden">РОЗПІЗНАТИ</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        const input = document.getElementById('file-input');
        const container = document.getElementById('cropper-container');
        let cropper;

        input.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const img = document.createElement('img');
            img.src = URL.createObjectURL(file);
            container.innerHTML = '';
            container.appendChild(img);
            
            cropper = new Cropper(img, {
                viewMode: 1,
                dragMode: 'crop',
                autoCropArea: 0.8,
                responsive: true
            });
            document.getElementById('add-screen-btn').classList.remove('hidden');
            document.getElementById('process-btn').classList.remove('hidden');
        });
    </script>
</body>
</html>
