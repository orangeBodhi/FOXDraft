<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>FOXDraft</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --accent: #22c55e; --danger: #ef4444; }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .wrapper { max-width: 800px; margin: 0 auto; }
        .step { background: white; padding: 25px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .hidden { display: none !important; }
        
        .btn { padding: 12px 24px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; color: white; }
        .btn-primary { background: var(--primary); }
        .btn-danger { background: var(--danger); }
        .btn-group { display: flex; gap: 8px; margin: 15px 0; flex-wrap: wrap; }
        
        .teams-row { display: flex; gap: 20px; margin-bottom: 30px; justify-content: center; }
        .team-container { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .team-logo { width: 100px; height: 100px; border: 2px solid #e2e8f0; border-radius: 12px; display: flex; justify-content: center; align-items: center; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .team-name { font-size: 1.2rem; font-weight: 800; }
        .captain-slot { width: 140px; height: 35px; border: 2px dashed #94a3b8; border-radius: 8px; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; color: #64748b; }

        .baskets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .basket { background: white; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; min-height: 120px; }
        .basket-title { font-weight: 800; text-align: center; margin-bottom: 10px; color: var(--primary); text-transform: uppercase; }
        .player-card { background: #f1f5f9; padding: 10px; margin: 5px 0; border-radius: 6px; text-align: center; cursor: grab; font-weight: 500; }
    </style>
</head>
<body>
    <div class="wrapper">
        <!-- Крок 1 -->
        <div id="step-1" class="step">
            <h2>Крок 1: Завантаження</h2>
            <input type="file" id="file-input" accept="image/*" class="hidden">
            <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">Завантажити скрін</button>
            <div id="croppers-grid"></div>
            <button id="process-btn" class="btn btn-primary hidden" style="margin-top:20px; background:var(--accent);">Розпізнати гравців</button>
        </div>

        <!-- Крок 2 -->
        <div id="step-2" class="step hidden">
            <h2>Крок 2: Драфт</h2>
            <div id="teams-row" class="teams-row"></div>
            
            <button id="toggle-will-btn" class="btn btn-primary" onclick="toggleWillTeam()">+ Додати команду 4</button>

            <h3>Кількість кошиків:</h3>
            <div class="btn-group" id="basket-buttons"></div>
            <div id="baskets-grid" class="baskets-grid"></div>
            
            <h3>Гравці</h3>
            <div id="players-list" class="basket" style="min-height: 50px;"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        const croppers = [];
        const initialTeams = [
            { name: 'Fortune', img: 'assets/fortune.png' },
            { name: 'Otamans', img: 'assets/otamans.png' },
            { name: 'X-Character', img: 'assets/character.png' }
        ];

        // Логіка Кроку 1
        document.getElementById('file-input').addEventListener('change', (e) => {
            const img = document.createElement('img');
            img.src = URL.createObjectURL(e.target.files[0]);
            document.getElementById('croppers-grid').appendChild(img);
            croppers.push(new Cropper(img, { viewMode: 1 }));
            document.getElementById('process-btn').classList.remove('hidden');
        });

        document.getElementById('process-btn').addEventListener('click', async () => {
            let allNames = [];
            for (let c of croppers) {
                const worker = await Tesseract.createWorker('ukr+eng');
                const { data: { text } } = await worker.recognize(c.getCroppedCanvas());
                await worker.terminate();
                allNames.push(...text.split('\n').filter(n => n.trim().length > 2));
            }
            renderPlayers(allNames);
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            renderTeams();
            createBasketButtons();
        });

        // Логіка Кроку 2
        function renderTeams() {
            const row = document.getElementById('teams-row');
            row.innerHTML = '';
            initialTeams.forEach(t => createTeamUI(t.name, t.img));
        }

        function createTeamUI(name, img) {
            const row = document.getElementById('teams-row');
            const div = document.createElement('div');
            div.className = 'team-container';
            div.innerHTML = `
                <div class="team-name">${name}</div>
                <div class="team-logo" style="background-image:url('${img}')"></div>
                <div class="captain-slot" data-team="${name}">Капітан</div>
            `;
            row.appendChild(div);
            new Sortable(div.querySelector('.captain-slot'), { group: 'shared' });
        }

        function toggleWillTeam() {
            const btn = document.getElementById('toggle-will-btn');
            const existingWill = document.querySelector('[data-team="WILL"]');
            
            if (existingWill) {
                existingWill.parentElement.remove();
                btn.innerText = "+ Додати команду 4";
                btn.className = "btn btn-primary";
            } else {
                createTeamUI('WILL', 'assets/will.png');
                btn.innerText = "- Прибрати команду 4";
                btn.className = "btn btn-danger";
            }
        }

        function renderPlayers(names) {
            const list = document.getElementById('players-list');
            names.forEach(n => {
                const d = document.createElement('div');
                d.className = 'player-card';
                d.innerText = n;
                list.appendChild(d);
            });
            new Sortable(list, { group: 'shared' });
        }

        function createBasketButtons() {
            const container = document.getElementById('basket-buttons');
            for(let i=2; i<=8; i++) {
                const btn = document.createElement('button');
                btn.className = 'btn btn-primary';
                btn.style.padding = '8px 15px';
                btn.innerText = i;
                btn.onclick = () => {
                    const grid = document.getElementById('baskets-grid');
                    grid.innerHTML = '';
                    for(let j=1; j<=i; j++) {
                        const b = document.createElement('div');
                        b.className = 'basket';
                        b.innerHTML = `<div class="basket-title">Кошик ${j}</div>`;
                        grid.appendChild(b);
                        new Sortable(b, { group: 'shared' });
                    }
                };
                container.appendChild(btn);
            }
        }
    </script>
</body>
</html>
