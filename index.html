<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>FOXDraft</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --accent: #22c55e; }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; }
        .wrapper { max-width: 800px; margin: 0 auto; }
        
        /* Сучасні кнопки */
        .btn { padding: 10px 20px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn-group { display: flex; gap: 8px; margin: 15px 0; }
        
        /* Команди */
        .teams-row { display: flex; gap: 20px; margin-bottom: 30px; justify-content: center; }
        .team-container { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .team-logo { width: 100px; height: 100px; border: 2px solid #e2e8f0; border-radius: 12px; display: flex; justify-content: center; align-items: center; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .team-name { font-size: 1.1rem; font-weight: 700; }
        .captain-slot { width: 140px; height: 30px; border: 1px dashed #94a3b8; border-radius: 6px; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; color: #64748b; }

        /* Кошики */
        .baskets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .basket { background: white; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; min-height: 120px; }
        .basket-title { font-weight: 800; text-align: center; margin-bottom: 10px; color: var(--primary); text-transform: uppercase; }
        .player-card { background: #f1f5f9; padding: 8px; margin: 5px 0; border-radius: 6px; text-align: center; cursor: grab; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="wrapper">
        <h2>Драфт</h2>
        <div id="teams-row" class="teams-row">
            <!-- Команди генеруються через JS -->
        </div>
        
        <button class="btn" onclick="addWillTeam()">+ Додати команду 4</button>

        <h3>Виберіть кількість кошиків:</h3>
        <div class="btn-group" id="basket-buttons"></div>

        <div id="baskets-grid" class="baskets-grid"></div>
        
        <h3>Список гравців</h3>
        <div id="players-list" class="basket"></div>
    </div>

    <script>
        const initialTeams = [
            { name: 'Fortune', img: 'assets/fortune.png' },
            { name: 'Otamans', img: 'assets/otamans.png' },
            { name: 'X-Character', img: 'assets/character.png' }
        ];

        function renderTeams() {
            const row = document.getElementById('teams-row');
            row.innerHTML = '';
            initialTeams.forEach(t => {
                const div = document.createElement('div');
                div.className = 'team-container';
                div.innerHTML = `
                    <div class="team-name">${t.name}</div>
                    <div class="team-logo" style="background-image:url('${t.img}')"></div>
                    <div class="captain-slot" data-team="${t.name}">Капітан</div>
                `;
                row.appendChild(div);
                new Sortable(div.querySelector('.captain-slot'), { group: 'shared' });
            });
        }

        function createBasketButtons() {
            const container = document.getElementById('basket-buttons');
            for(let i=2; i<=8; i++) {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = i;
                btn.onclick = () => createBaskets(i);
                container.appendChild(btn);
            }
        }

        function createBaskets(count) {
            const grid = document.getElementById('baskets-grid');
            grid.innerHTML = '';
            for(let i=1; i<=count; i++) {
                const b = document.createElement('div');
                b.className = 'basket';
                b.innerHTML = `<div class="basket-title">Кошик ${i}</div>`;
                grid.appendChild(b);
                new Sortable(b, { group: 'shared' });
            }
        }

        function addWillTeam() {
            const row = document.getElementById('teams-row');
            const div = document.createElement('div');
            div.className = 'team-container';
            div.innerHTML = `
                <div class="team-name">WILL</div>
                <div class="team-logo" style="background-image:url('assets/will.png')"></div>
                <div class="captain-slot" data-team="WILL">Капітан</div>
            `;
            row.appendChild(div);
            new Sortable(div.querySelector('.captain-slot'), { group: 'shared' });
        }

        // Init
        renderTeams();
        createBasketButtons();
        new Sortable(document.getElementById('players-list'), { group: 'shared' });
    </script>
</body>
</html>
