<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FOXDraft</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
    <style>
        :root { --bg-grass: #eefaf3; --primary: #2563eb; --accent: #22c55e; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: var(--bg-grass); color: var(--text); margin: 0; min-height: 100vh; }
        .wrapper { width: 100%; max-width: 600px; margin: 0 auto; }
        .step { background: rgba(255, 255, 255, 0.8); padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        
        /* Виправлене позиціювання команди */
        .team-slot { min-width: 80px; height: 110px; border: 2px dashed #cbd5e1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; padding-top: 5px; background-size: 60px; background-repeat: no-repeat; background-position: center bottom 5px; font-size: 10px; font-weight: bold; }
        
        .baskets-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .basket { background: white; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; min-height: 100px; }
        .player-card { background: #f8fafc; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #cbd5e1; cursor: grab; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div id="step-2" class="step">
            <h2>Крок 2: драфт.</h2>
            <p>Перетягніть капітанів в їх команди.</p>
            <div id="teams-container" style="display:flex; gap:5px; margin-bottom:20px;">
                <div class="team-slot" style="background-image:url('assets/fortune.png')">Fortune</div>
                <div class="team-slot" style="background-image:url('assets/otamans.png')">Otamans</div>
                <div class="team-slot" style="background-image:url('assets/character.png')">X-Character</div>
            </div>
            <button class="btn-action" onclick="addWillTeam()">додати команду 4</button>

            <div id="baskets-grid" class="baskets-grid"></div>
            <h3>ГРАВЦІ</h3>
            <div id="players-list" class="basket"></div>
        </div>
    </div>

    <script>
        // Ініціалізація драфту
        function initDraft() {
            // Робимо слоти команд цілями для перетягування
            document.querySelectorAll('.team-slot').forEach(el => {
                new Sortable(el, { group: 'shared', animation: 150 });
            });
            // Робимо кошики цілями
            document.querySelectorAll('.basket').forEach(el => {
                new Sortable(el, { group: 'shared', animation: 150 });
            });
            // Список гравців
            new Sortable(document.getElementById('players-list'), { group: 'shared', animation: 150 });
        }

        function addWillTeam() {
            const container = document.getElementById('teams-container');
            const div = document.createElement('div');
            div.className = 'team-slot';
            div.style.backgroundImage = "url('assets/will.png')";
            div.innerText = 'WILL';
            container.appendChild(div);
            // Переініціалізуємо Sortable для нової команди
            new Sortable(div, { group: 'shared', animation: 150 });
        }

        // Виклик ініціалізації
        initDraft();
    </script>
</body>
</html>
